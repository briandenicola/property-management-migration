version: '3'

dotenv: ['infrastructure/azure/.env']

env:
  APP_TITLE: "Property Manager"
  DEFAULT_REGION: "southcentralus"
  MSBUILD: "C:\\Program Files\\Microsoft Visual Studio\\18\\Enterprise\\MSBuild\\Current\\Bin\\MSBuild.exe"
  PUBLISH_DIR: "{{.ROOT_DIR}}\\publish"

includes:
  legacy:
    taskfile: ./infrastructure/legacy/Taskfile.yaml
    internal: false
    dir: ./infrastructure/legacy/
  azure:
    taskfile: ./infrastructure/azure/Taskfile.yaml
    internal: false
    dir: ./infrastructure/azure/

tasks:
  default:
    cmds:
    - task --list

  build:
    desc: "Builds a solution in Release configuration (usage: task build -- legacy|azure)"
    vars:
      TARGET: '{{default "legacy" .CLI_ARGS}}'
      SOLUTION_DIR: '{{.ROOT_DIR}}\src\{{if eq .TARGET "azure"}}Azure{{else}}Legacy{{end}}'
      SOLUTION_FILE: '{{.ROOT_DIR}}\src\{{if eq .TARGET "azure"}}Azure{{else}}Legacy{{end}}\PropertyManager.sln'
      WEB_PROJECT: '{{.ROOT_DIR}}\src\{{if eq .TARGET "azure"}}Azure{{else}}Legacy{{end}}\PropertyManager.Web\PropertyManager.Web.csproj'
    cmds:
    - pwsh -NoProfile -Command "if (Test-Path '{{.PUBLISH_DIR}}') { Remove-Item -Recurse -Force '{{.PUBLISH_DIR}}' }"
    - pwsh -NoProfile -Command "New-Item -ItemType Directory -Path '{{.PUBLISH_DIR}}' -Force | Out-Null"
    - '"{{.MSBUILD}}" "{{.SOLUTION_FILE}}" /t:Restore /p:RestorePackagesConfig=true /verbosity:minimal /nologo'
    - '"{{.MSBUILD}}" "{{.SOLUTION_FILE}}" /t:Build /p:Configuration=Release /verbosity:minimal /nologo /m'
    - '"{{.MSBUILD}}" "{{.WEB_PROJECT}}" /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=Package /verbosity:minimal /nologo /m'
    - pwsh -NoProfile -Command "Copy-Item '{{.SOLUTION_DIR}}\PropertyManager.Web\obj\Release\Package\PackageTmp\*' '{{.PUBLISH_DIR}}' -Recurse -Force"
