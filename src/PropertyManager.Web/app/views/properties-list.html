<div class="row">
    <div class="col-md-12">
        <h2><span class="glyphicon glyphicon-home"></span> Properties</h2>
        <hr />
    </div>
</div>

<div class="panel panel-default">
    <div class="panel-heading">Search</div>
    <div class="panel-body">
        <form class="form-inline" ng-submit="vm.search()">
            <div class="form-group">
                <label>Keyword</label>
                <input type="text" class="form-control" ng-model="vm.filters.search" placeholder="Address or name" />
            </div>
            <div class="form-group">
                <label>Status</label>
                <select class="form-control" ng-model="vm.filters.isActive">
                    <option value="">All</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
            <button type="button" class="btn btn-default" ng-click="vm.clear()">Clear</button>
        </form>
    </div>
</div>

<div class="panel panel-default">
    <div class="panel-heading">Property Directory</div>
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>Name</th>
                <th>Address</th>
                <th>City</th>
                <th>State</th>
                <th>Zip</th>
                <th>Active</th>
            </tr>
        </thead>
        <tbody>
            <tr ng-repeat="property in vm.properties" ui-sref="propertyDetail({ id: property.id })" class="clickable-row">
                <td>{{property.name}}</td>
                <td>{{property.addressLine1}}</td>
                <td>{{property.city}}</td>
                <td>{{property.state}}</td>
                <td>{{property.postalCode}}</td>
                <td>
                    <span class="label" ng-class="{'label-success': property.isActive, 'label-default': !property.isActive}">
                        {{property.isActive ? 'Active' : 'Inactive'}}
                    </span>
                </td>
            </tr>
            <tr ng-if="!vm.properties.length && !vm.loading">
                <td colspan="6" class="text-center text-muted">No properties found.</td>
            </tr>
        </tbody>
    </table>
</div>

<div class="well text-center" ng-if="vm.loading">
    <span class="glyphicon glyphicon-refresh spinning"></span> Loading properties...
</div>
