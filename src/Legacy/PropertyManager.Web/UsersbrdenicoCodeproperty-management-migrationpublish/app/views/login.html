<div class="row login-row">
    <div class="col-sm-6 col-sm-offset-3 col-md-4 col-md-offset-4">
        <div class="panel panel-default login-panel">
            <div class="panel-heading">
                <h3 class="panel-title"><span class="glyphicon glyphicon-lock"></span> Sign In</h3>
            </div>
            <div class="panel-body">
                <form ng-submit="vm.login()" novalidate>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" class="form-control" ng-model="vm.credentials.username" required />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" ng-model="vm.credentials.password" required />
                    </div>
                    <div class="checkbox">
                        <label>
                            <input type="checkbox" ng-model="vm.credentials.rememberMe" /> Remember me
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" ng-disabled="vm.working">
                        <span class="glyphicon glyphicon-log-in"></span> Login
                    </button>
                    <p class="text-danger top-buffer" ng-if="vm.errorMessage">{{vm.errorMessage}}</p>
                </form>
            </div>
        </div>
    </div>
</div>
