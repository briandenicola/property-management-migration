version: '3'

vars:
  DEFAULT_REGION: southcentralus

tasks:
  up:
    desc: Creates the Azure PaaS infrastructure (App Service + Azure SQL)
    cmds:
    - task: init
    - task: apply

  init:
    desc: Initializes Terraform for the Azure PaaS deployment
    cmds:
    - terraform workspace new {{.REGION}} || true
    - terraform workspace select {{.REGION}}
    - terraform init
    vars:
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  apply:
    desc: Applies Terraform configuration for the Azure PaaS deployment
    cmds:
    - terraform apply -auto-approve -var "location={{.REGION}}" -var "entra_app_client_id={{.ENTRA_APP_CLIENT_ID}}" -compact-warnings
    vars:
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  plan:
    desc: Shows Terraform execution plan for the Azure PaaS deployment
    cmds:
    - terraform plan -var "location={{.REGION}}" -var "entra_app_client_id={{.ENTRA_APP_CLIENT_ID}}" -compact-warnings
    vars:
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  down:
    desc: Destroys the Azure PaaS resources and cleans up Terraform
    cmds:
    - az group delete -n {{.RG}} --yes --no-wait || true
    - pwsh -NoProfile -Command "Remove-Item -Recurse -Force terraform.tfstate.d, .terraform.lock.hcl, .terraform, terraform.tfstate, terraform.tfstate.backup, .terraform.tfstate.lock.info -ErrorAction SilentlyContinue"
    vars:
      RG:
        sh: terraform output -raw resource_group_name

  deploy:
    desc: Builds the Azure app and deploys to App Service
    dir: "{{.ROOT_DIR}}"
    cmds:
    - task: :build
      vars:
        CLI_ARGS: azure
    - pwsh -NoProfile -Command "Compress-Archive -Path '{{.ROOT_DIR}}\publish\*' -DestinationPath '{{.ROOT_DIR}}\publish\app.zip' -Force"
    - az webapp deploy --resource-group {{.RG}} --name {{.APP_NAME}} --src-path "{{.ROOT_DIR}}\publish\app.zip" --type zip --clean true
    - pwsh -NoProfile -Command "Remove-Item '{{.ROOT_DIR}}\publish\app.zip' -Force"
    vars:
      RG:
        sh: cd "{{.TASKFILE_DIR}}" && terraform output -raw resource_group_name
      APP_NAME:
        sh: cd "{{.TASKFILE_DIR}}" && terraform output -raw app_service_name
